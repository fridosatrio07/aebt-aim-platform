services:
  postgres:
    image: timescale/timescaledb:latest-pg16
    environment:
      POSTGRES_DB: aim_platform
      POSTGRES_USER: aim_app
      POSTGRES_PASSWORD: aim_dev_password
    ports:
      - "5432:5432"
    volumes:
      - aim_postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: aim_minio
      MINIO_ROOT_PASSWORD: aim_minio_password
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - aim_minio_data:/data

  keycloak:
    image: quay.io/keycloak/keycloak:25.0
    command: start-dev
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    ports:
      - "8080:8080"

volumes:
  aim_postgres_data:
  aim_minio_data:
